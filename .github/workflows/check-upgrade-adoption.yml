name: Check upgrade adoption

on:
  schedule:
    - cron: "11,26,41,56 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-adoption:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_API_VERSION: ${{ vars.TARGET_API_VERSION }}
          ADOPTION_THRESHOLD: ${{ vars.ADOPTION_THRESHOLD }}
        run: python upgrade_adoption_watcher.py

      - name: Commit updated state
        run: bash scripts/commit_state.sh "Update upgrade-adoption state [skip ci]" state/upgrade_adoption.json
