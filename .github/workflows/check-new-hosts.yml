name: Check for new Gonka hosts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: check-new-hosts
  cancel-in-progress: false

jobs:
  check-new-hosts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python new_host_bot.py

      - name: Commit updated state
        run: |
          git config user.name "gonka-bot"
          git config user.email "gonka-bot@users.noreply.github.com"
          git add state/hosts.json state/host_log.csv
          git diff --staged --quiet || git commit -m "Update hosts state [skip ci]"
          git push
