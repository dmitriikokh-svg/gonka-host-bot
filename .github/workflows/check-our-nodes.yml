name: Check our nodes

on:
  schedule:
    # Avoid the top of the hour, when GitHub reports the highest schedule load.
    - cron: "17 * * * *"
  workflow_dispatch: {}

concurrency:
  group: check-our-nodes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-our-nodes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check our nodes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: python our_nodes_watcher.py

      - name: Commit updated state
        run: |
          git config user.name "gonka-bot"
          git config user.email "gonka-bot@users.noreply.github.com"
          git add state/our_nodes_state.json
          git diff --staged --quiet || git commit -m "Update our nodes monitor state [skip ci]"
          git push
