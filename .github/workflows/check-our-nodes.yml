name: Check our nodes

on:
  schedule:
    # Avoid the top of the hour, when GitHub reports the highest schedule load.
    - cron: "17 * * * *"
  workflow_dispatch: {}

concurrency:
  group: check-our-nodes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-our-nodes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check our nodes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: python our_nodes_watcher.py

      - name: Commit updated state
        run: |
          git config user.name "gonka-bot"
          git config user.email "gonka-bot@users.noreply.github.com"
          git add state/our_nodes_state.json
          if git diff --staged --quiet; then
            echo "State did not change. Nothing to commit."
            exit 0
          fi

          git commit -m "Update our nodes monitor state [skip ci]"

          # The main branch can receive a manual commit while this scheduled
          # run is executing. Rebase the state commit and retry the push.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push rejected; syncing with origin/main (attempt $attempt/3)."
            GIT_EDITOR=true git pull --rebase origin main
          done

          echo "Could not push state after 3 attempts."
          exit 1
