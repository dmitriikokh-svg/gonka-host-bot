name: Check for cPoC exclusions

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: check-exclusions
  cancel-in-progress: false

jobs:
  check-exclusions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python excluded_watcher.py

      - name: Commit updated state
        run: |
          git config user.name "gonka-bot"
          git config user.email "gonka-bot@users.noreply.github.com"
          git add state/excluded.json
          git diff --staged --quiet || git commit -m "Update excluded-participants state [skip ci]"
          git push
