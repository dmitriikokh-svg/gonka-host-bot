name: Check Glamsterdam upgrade date

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: check-exclusions
  cancel-in-progress: false

jobs:
  check-glamsterdam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python glamsterdam_watcher.py

      - name: Commit updated state
        run: |
          git config user.name "gonka-bot"
          git config user.email "gonka-bot@users.noreply.github.com"
          git add state/glamsterdam_upgrade.json
          git diff --staged --quiet || git commit -m "Update Glamsterdam upgrade state [skip ci]"
          git push
