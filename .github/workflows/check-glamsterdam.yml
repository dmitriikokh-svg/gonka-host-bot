name: Check Glamsterdam upgrade date

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-glamsterdam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python glamsterdam_watcher.py

      - name: Commit updated state
        run: bash scripts/commit_state.sh "Update Glamsterdam upgrade state [skip ci]" state/glamsterdam_upgrade.json
